# NASA APOD Downloader — 配置文件
# CLI 参数优先级高于此文件；此文件优先级高于内置默认值

# ── API ──────────────────────────────────────────────────────
# NASA API Key 文件路径（相对于脚本运行目录）
# 申请地址：https://api.nasa.gov/
api_key_file: api-key.txt

# NASA API 每小时请求上限（超出会触发 429，update.py 会弹出警告）
api_rate_limit: 1000

# NASA APOD 最早可用日期（不建议修改）
apod_start: "1995-06-16"

# ── 日期范围 ──────────────────────────────────────────────────
# 默认下载起始日期（CLI --start 可覆盖）
start_date: "2024-01-01"

# 默认下载结束日期（CLI --end 可覆盖）
end_date: "2026-03-10"

# ── 目录 ──────────────────────────────────────────────────────
# 每日原始 JSON 存放目录
data_dir: data

# organize.py 合并输出目录（按月生成 YYYY-MM.json）
dist_dir: dist

# ── 性能 ──────────────────────────────────────────────────────
# 并发下载线程数（受 GIL 影响较小，IO 密集型适合 4~8）
workers: 4

# ── 重试 ──────────────────────────────────────────────────────
# main.py 流水线中 tryagain 最大重试轮数
max_retry_rounds: 3
